# ============================================
# SyntaxCore WMS — nginx (frontend + reverse proxy)
# ============================================
# NOTE: replace "backend" below with the actual hostname/service name of
# your Spring Boot container if it differs (e.g. in docker-compose this
# matches the service name; on a VM it might be "127.0.0.1:8080").

# --- HTTP: redirect everything to HTTPS, except ACME challenge for
#     Let's Encrypt certificate issuance/renewal ---
server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS: actual app ---
server {
  listen 443 ssl;
  http2 on;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # --- SSL ---
  # certbot (see docker-compose.yml) stores certs under /etc/letsencrypt/live/<domain>/,
  # which is mounted here as /etc/nginx/ssl/live/<domain>/. Replace
  # YOUR_DOMAIN below with your actual domain after running the certbot
  # issuance command in DEPLOYMENT.md, then restart the frontend container.
  ssl_certificate     /etc/nginx/ssl/live/YOUR_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/YOUR_DOMAIN/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # --- Security headers ---
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # --- Gzip ---
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  client_max_body_size 50M;

  # --- REST API -> Spring Boot backend ---
  # This block was previously missing entirely, so in production every
  # /api/v1/* call fell through to the Angular try_files fallback below and
  # silently returned index.html (200 OK, HTML body) instead of JSON. This
  # is why GET/POST/PUT/DELETE calls must be verified after deploying —
  # without this block, none of them reach the backend at all.
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # --- Actuator health check (optional, useful for uptime monitors) ---
  location /actuator/ {
    proxy_pass http://backend:8080/actuator/;
    proxy_set_header Host $host;
  }

  # --- WebSocket (STOMP over SockJS) -> Spring Boot backend ---
  # Needs the Upgrade/Connection headers for the real-ws transport, and a
  # long read timeout since SockJS long-polling fallback also lives here.
  location /ws/ {
    proxy_pass http://backend:8080/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
  }

  # --- Angular app (SPA routing) ---
  location / {
    try_files $uri $uri/ /index.html;
  }

  # --- Cache static assets ---
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # --- No cache for index ---
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}

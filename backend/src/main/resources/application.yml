# ============================================
# SyntaxCore Workforce Management System
# Application Configuration
# ============================================

spring:
  application:
    name: syntaxcore-workforce-management
  jackson:
    time-zone: Asia/Kolkata
    date-format: yyyy-MM-dd'T'HH:mm:ss

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/syntaxcore_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SyntaxCoreHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          # Belt-and-suspenders alongside the container TZ=Asia/Kolkata /
          # -Duser.timezone JVM flag in the Dockerfile — keeps the JDBC
          # driver's own timestamp handling aligned with the app's business
          # timezone regardless of what environment this runs in.
          time_zone: Asia/Kolkata
        order_inserts: true
        order_updates: true

  # Flyway Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Auto-correct checksum mismatches that occur when migration files are
    # edited after they've already been applied (common during development).
    # This is equivalent to running `flyway repair` before each migration.
    repair-on-migrate: true
    # Allow migrations to be applied even if a later version already exists,
    # which can happen after manually restoring a history table backup.
    out-of-order: true
    # Never fail the application on a validation error — repair and continue.
    validate-on-migrate: false

  # File Upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Mail Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@syntaxcore.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Cache
  cache:
    type: simple

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-token:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# App Configuration (FIXED: merged duplicate 'app:' keys)
app:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size: 52428800
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}
    max-attempts: ${OTP_MAX_ATTEMPTS:3}

# OpenAI
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4-turbo-preview
  max-tokens: 2000

# Twilio SMS
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token:  ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: SyntaxCore Workforce Management API
    description: Enterprise Workforce & Internship Management System API
    version: 1.0.0

# Logging
logging:
  level:
    com.syntaxcore: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/syntaxcore-workforce.log

# Actuator
management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
